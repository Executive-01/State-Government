<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi San Andreas State Government</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#edf2f7;
padding:20px;

}

.container{

max-width:1200px;
margin:auto;
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 30px rgba(0,0,0,.15);

}

.header{

background:linear-gradient(135deg,#0d6efd,#0047b3);
color:white;
padding:25px;
text-align:center;

}

.header h1{

font-size:28px;

}

.header p{

margin-top:8px;
opacity:.9;

}

.dashboard{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;

}

.card{

background:white;
border-radius:10px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,.12);
text-align:center;

}

.card h2{

font-size:34px;
margin-top:8px;
color:#0d6efd;

}

.toolbar{

padding:20px;
display:flex;
flex-wrap:wrap;
gap:10px;

}

.toolbar input{

flex:1;
min-width:200px;
padding:12px;
border:1px solid #ccc;
border-radius:8px;

}

button{

padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:.3s;

}

button:hover{

transform:translateY(-2px);

}

.primary{

background:#0d6efd;
color:white;

}

.success{

background:#198754;
color:white;

}

.warning{

background:#ffc107;
color:black;

}

.danger{

background:#dc3545;
color:white;

}

.info{

background:#0dcaf0;
color:white;

}

.table-area{

padding:20px;
overflow:auto;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#0d6efd;
color:white;
padding:14px;

}

td{

padding:12px;
border-bottom:1px solid #ddd;
text-align:center;

}

tbody tr:nth-child(even){

background:#f8f9fa;

}

tbody tr:hover{

background:#eef6ff;

}

td:nth-child(2){

text-align:left;
width:40%;

}

.badge{

padding:6px 12px;
border-radius:20px;
color:white;
font-size:13px;

}

.hadir{

background:#198754;

}

.tidak{

background:#dc3545;

}

.modal{

display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);

}

.modal-content{

background:white;
width:90%;
max-width:650px;
margin:60px auto;
padding:20px;
border-radius:12px;

}

.modal h3{

margin-bottom:15px;

}

#riwayatList{

max-height:350px;
overflow:auto;

}

@media(max-width:700px){

.toolbar{

flex-direction:column;

}

button{

width:100%;

}

}

#loginPage{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d6efd,#002d72);

}

.login-box{

width:360px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
text-align:center;

}

.login-box h2{

margin-bottom:10px;
color:#0d6efd;

}

.login-box p{

margin-bottom:20px;
color:#666;

}

.login-box input{

width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;

}

.login-box button{

width:100%;
margin-top:10px;

    }

</style>

</head>

<body>

<div id="loginPage">

<div class="login-box">

<h2>LOGIN PANEL</h2>

<p>San Andreas State Government</p>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button
class="primary"
onclick="login()">

LOGIN

</button>

</div>

</div>

<div id="app" style="display:none;">

<div class="container">

<div class="header">

<h1>ABSENSI</h1>

<p>SAN ANDREAS STATE GOVERNMENT</p>

<p id="tanggal"></p>

</div>

<div class="dashboard">

<div class="card">

Total Anggota

<h2 id="totalAnggota">0</h2>

</div>

<div class="card">

Hadir

<h2 id="hadirCount">0</h2>

</div>

<div class="card">

Tidak Hadir

<h2 id="tidakCount">0</h2>

</div>

</div>

<div class="toolbar">

<button
class="danger"
onclick="logout()">

Logout

</button>

<input
type="text"
id="search"
placeholder="Cari anggota..."
onkeyup="cari()">

<input
type="text"
id="namaBaru"
placeholder="Tambah anggota baru">

<button
class="success"
onclick="tambahAnggota()">

Tambah

</button>

<button
class="primary"
onclick="checkAll()">

Centang Semua

</button>

<button
class="danger"
onclick="uncheckAll()">

Hapus Centang

<button
class="danger"
onclick="hapusSemuaRiwayat()">

Hapus Semua Riwayat

</button>

</button>

<button
class="info"
onclick="downloadExcel()">

Export Excel

</button>

</div>

<div class="table-area">

<table>

<thead>

<tr>

<th>No</th>

<th>Nama</th>

<th>Status</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="body">

</tbody>

</table>

</div>

</div>

<div
class="modal"
id="modal">

<div class="modal-content">

<h3>Riwayat Absensi</h3>

<div id="riwayatList"></div>

<br>

<button
class="danger"
onclick="tutupModal()">

Tutup

</button>

</div>

</div>

</div>

<script>
const defaultAnggota=[
"Zalvyero Zaroleth",
"Qheyla Vanuez",
"Steven Marfies",
"Sheline Atealyna",
"Mouviene Cavendrelle",
"Michael Sylvan",
"Sheyza Winterfell",
"Reyzen Valgueza",
"Jazey Lethewyche",
"Cassius Cavendrelle",
"Raymond Marfies",
"Johan Roberto",
"Sergio Morgan",
"Jay Marfies",
"Tyrone Walker",
"Elviano Agnelli",
"Smith Carasquillo",
"Cesar Barkley",
"Rodrigo Marquez",
"Carlos Pedro",
"Katsuro Ryuzaki",
"Yoshiro Nakamura",
"Darrell Lawson",
"Barrell Lawson",
"Jeffanio Lawson",
"Zalvero Zaroleth",
"Vanderline Dlaxs",
"Kaelis Zevallius",
"Connor Maverlyn",
"Kazenn Cluivert",
"Thancere Beauregard"
];

let anggota=JSON.parse(localStorage.getItem("anggota"));

if(!anggota){

anggota=defaultAnggota.map(n=>({

nama:n,
hadir:false,
keterangan:"",
riwayat:[]

}));

}

document.getElementById("tanggal").innerHTML=
new Date().toLocaleDateString("id-ID",{

weekday:"long",
day:"numeric",
month:"long",
year:"numeric"

});

function simpan(){

localStorage.setItem(
"anggota",
JSON.stringify(anggota)
);

}

function tampilkan(){

const body=document.getElementById("body");

body.innerHTML="";

let hadir=0;

anggota.forEach((a,index)=>{

if(a.hadir) hadir++;

body.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${a.nama}</td>

<td>

<input

type="checkbox"

${a.hadir?"checked":""}

onchange="ubahStatus(${index},this.checked)"

>

<br><br>

<span class="badge ${a.hadir?"hadir":"tidak"}">

${a.hadir
?"Hadir"
:"Tidak Hadir"+(a.keterangan ? " - "+a.keterangan : "")
}

</span>

${!a.hadir ? `

<br><br>

<button 
class="warning"
onclick="isiKeterangan(${index})">

Isi Keterangan

</button>

`:""}

</td>

<td>

<button

class="warning"

onclick="editAnggota(${index})">

Edit

</button>

<button

class="danger"

onclick="hapusAnggota(${index})">

Hapus

</button>

<button

class="primary"

onclick="lihatRiwayat(${index})">

Riwayat

</button>

</td>

</tr>

`;

});

document.getElementById("totalAnggota").innerHTML=anggota.length;
document.getElementById("hadirCount").innerHTML=hadir;
document.getElementById("tidakCount").innerHTML=anggota.length-hadir;

}

tampilkan();

function tambahAnggota(){

let nama=document.getElementById("namaBaru").value.trim();

if(nama==""){

alert("Masukkan nama.");

return;

}

anggota.push({

nama:nama,
hadir:false,
keterangan:"",
riwayat:[]

});

document.getElementById("namaBaru").value="";

simpan();

tampilkan();

}

function editAnggota(i){

let nama=prompt("Edit Nama",anggota[i].nama);

if(!nama) return;

anggota[i].nama=nama.trim();

simpan();

tampilkan();

}

function hapusAnggota(i){

if(confirm("Hapus anggota?")){

anggota.splice(i,1);

simpan();

tampilkan();

}

}

function ubahStatus(i,status){

    if(status){

        anggota[i].hadir=true;

        anggota[i].keterangan="";

    }else{

        let ket=prompt(
            "Masukkan keterangan tidak hadir:",
            "Tanpa Keterangan"
        );

        if(ket===null){
            tampilkan();
            return;
        }

        anggota[i].hadir=false;
        anggota[i].keterangan=ket;

    }

    simpan();

    tampilkan();

}

function isiKeterangan(i){

let ket=prompt(
"Masukkan keterangan tidak hadir:",
anggota[i].keterangan || ""
);


if(ket===null) return;


anggota[i].keterangan=ket;


anggota[i].riwayat.push({

tanggal:new Date().toLocaleDateString("id-ID"),

status:"Tidak Hadir - "+ket

});


simpan();

tampilkan();

}

function checkAll(){

    anggota.forEach(a=>a.hadir=true);

    simpan();

    tampilkan();

}

function uncheckAll(){

    anggota.forEach(a=>a.hadir=false);

    simpan();

    tampilkan();

}

function cari(){

let key=document.getElementById("search").value.toUpperCase();

document.querySelectorAll("#body tr").forEach(r=>{

r.style.display=
r.cells[1].innerText.toUpperCase().includes(key)
?"":"none";

});

}

let anggotaDipilih = -1;

function lihatRiwayat(i){

anggotaDipilih=i;

document.getElementById("modal").style.display="block";

let html="";

if(anggota[i].riwayat.length==0){

html="<p>Belum ada riwayat.</p>";

}else{

anggota[i].riwayat.forEach((r,index)=>{

html+=`

<div style="border:1px solid #ddd;padding:10px;margin-bottom:8px;border-radius:8px">

<label>

<input
type="checkbox"
class="pilihRiwayat"
value="${index}">

<b>${r.tanggal}</b>

</label>

<br>

${r.status}

</div>

`;

});

}

html+=`

<button
class="danger"
onclick="hapusRiwayatTerpilih()">

Hapus Riwayat Terpilih

</button>

`;

document.getElementById("riwayatList").innerHTML=html;

}

function hapusRiwayatTerpilih(){

let dipilih=[...document.querySelectorAll(".pilihRiwayat:checked")]

.map(x=>parseInt(x.value))

.sort((a,b)=>b-a);

if(dipilih.length==0){

alert("Pilih riwayat yang akan dihapus.");

return;

}

if(!confirm("Hapus riwayat yang dipilih?")) return;

dipilih.forEach(index=>{

anggota[anggotaDipilih].riwayat.splice(index,1);

});

simpan();

lihatRiwayat(anggotaDipilih);

}

function hapusSemuaRiwayat(){

    if(!confirm("Yakin ingin menghapus seluruh riwayat absensi?")) return;

    anggota.forEach(a=>{

        a.riwayat=[];

    });

    simpan();

    alert("Seluruh riwayat berhasil dihapus.");

}

function tutupModal(){

document.getElementById("modal").style.display="none";

}

function downloadExcel(){

const tanggal=new Date().toLocaleDateString("id-ID",{
    day:"2-digit",
    month:"2-digit",
    year:"numeric"
});

anggota.forEach(a=>{

   a.riwayat.push({

tanggal:tanggal,

status:a.hadir
?"Hadir"
:"Tidak Hadir - "+(a.keterangan || "Tanpa Keterangan")

});

});

simpan();

let data=[

["ABSENSI SAN ANDREAS STATE GOVERNMENT"],

["Tanggal",document.getElementById("tanggal").innerHTML],

[],

["No","Nama","Status","Riwayat"]

];

anggota.forEach((a,i)=>{

data.push([

i+1,

a.nama,

a.hadir
?"Hadir"
:"Tidak Hadir - "+(a.keterangan || "Tanpa Keterangan"),

a.riwayat.map(x=>x.tanggal+" - "+x.status).join("\n")

]);

});

let wb=XLSX.utils.book_new();

let ws=XLSX.utils.aoa_to_sheet(data);

ws["!cols"]=[

{wch:8},

{wch:40},

{wch:20},

{wch:60}

];

XLSX.utils.book_append_sheet(wb,ws,"Absensi");

XLSX.writeFile(wb,"Absensi_SASG.xlsx");

}

if(localStorage.getItem("login")=="true"){

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

}

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="GOV" && pass==="State26"){

localStorage.setItem("login","true");

document.getElementById("loginPage").style.display="none";

document.getElementById("app").style.display="block";

}else{

alert("Username atau Password salah.");

}

}

function logout(){

localStorage.removeItem("login");

location.reload();

}

</script>

</body>
</html>
