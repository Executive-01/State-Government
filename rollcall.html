<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi San Andreas State Government</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#edf2f7;
padding:20px;

}

.container{

max-width:1200px;
margin:auto;
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 30px rgba(0,0,0,.15);

}

.header{

background:linear-gradient(135deg,#0d6efd,#0047b3);
color:white;
padding:25px;
text-align:center;

}

.header h1{

font-size:28px;

}

.header p{

margin-top:8px;
opacity:.9;

}

.dashboard{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;

}

.card{

background:white;
border-radius:10px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,.12);
text-align:center;

}

.card h2{

font-size:34px;
margin-top:8px;
color:#0d6efd;

}

.toolbar{

padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
align-items:start;

}

.toolbar input{

width:100%;
min-width:0;
padding:12px;
border:1px solid #ccc;
border-radius:8px;

}

button{

padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:.3s;

}

button:hover{

transform:translateY(-2px);

}

.primary{

background:#0d6efd;
color:white;

}

.success{

background:#198754;
color:white;

}

.warning{

background:#ffc107;
color:black;

}

.danger{

background:#dc3545;
color:white;

}

.info{

background:#0dcaf0;
color:white;

}

.table-area{

padding:20px;
overflow:auto;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#0d6efd;
color:white;
padding:14px;

}

td{

padding:12px;
border-bottom:1px solid #ddd;
text-align:center;

}

tbody tr:nth-child(even){

background:#f8f9fa;

}

tbody tr:hover{

background:#eef6ff;

}

td:nth-child(2){

text-align:left;
width:40%;

}

.badge{

padding:6px 12px;
border-radius:20px;
color:white;
font-size:13px;

}

.hadir{

background:#198754;

}

.tidak{

background:#dc3545;

}

.modal{

display:none;
position:fixed;
inset:0;
padding:12px;
background:rgba(0,0,0,.45);
z-index:1000;
overflow:auto;

}

.modal-content{

background:white;
width:min(100%,650px);
margin:20px auto;
padding:20px;
border-radius:12px;
max-height:calc(100vh - 40px);
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,.25);

}

.modal h3{

margin-bottom:15px;

}

#riwayatList{

max-height:350px;
overflow:auto;

}

#modalSemuaRiwayat .modal-content{

width:min(100%,1200px);
max-width:none;
height:calc(100vh - 24px);
display:flex;
flex-direction:column;
gap:12px;

}

#semuaRiwayatList{

flex:1;
overflow:auto;
-webkit-overflow-scrolling:touch;
background:#f8fbff;
border:1px solid #dbe4f0;
border-radius:10px;
padding:12px;

}

.semua-riwayat-header,
.semua-riwayat-row{
	display:grid;
grid-template-columns:60px minmax(160px,260px) minmax(0,1fr);
gap:12px;
align-items:start;
width:100%;
min-width:0;

}

.semua-riwayat-header{

background:#0d6efd;
color:white;
font-weight:bold;
padding:10px 12px;
border-radius:10px 10px 0 0;
margin-bottom:8px;

}

.semua-riwayat-row{

background:white;
border:1px solid #e2e8f0;
border-radius:10px;
padding:12px;
margin-bottom:10px;

}

.semua-riwayat-row:last-child{

margin-bottom:0;

}

.semua-riwayat-no,
.semua-riwayat-nama{

font-weight:bold;
color:#0d6efd;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

}

.semua-riwayat-nama.nama-hijau{

color:#198754;

}

.semua-riwayat-nama.nama-merah{

color:#dc3545;

}

.semua-riwayat-riwayat{
	display:flex;
flex-direction:column;
gap:8px;
min-width:0;

}

.semua-riwayat-item{

padding:8px 10px;
border-radius:8px;
background:#eef6ff;
border:1px solid #cfe2ff;
font-size:14px;
line-height:1.4;
word-break:break-word;
overflow-wrap:anywhere;

}

.semua-riwayat-empty{

padding:10px;
background:#f8f9fa;
border-radius:8px;
color:#555;

}

#inputDialogInput{

width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;

}

.aturan-content{

max-width:520px;

}

.aturan-grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;

}

.aturan-grid label,
.aturan-jenis label{
	display:flex;
flex-direction:column;
gap:8px;
font-weight:bold;
color:#333;

}

.aturan-grid input,
.aturan-grid select{

width:100%;
padding:10px 12px;
border:1px solid #ccc;
border-radius:8px;

}

.aturan-jenis{
	display:grid;
grid-template-columns:1fr;
gap:10px;
margin-bottom:15px;

}

.aturan-jenis label{

padding:10px 12px;
border:1px solid #d7e3f6;
border-radius:8px;
background:#f7fbff;
font-weight:normal;

}

.aturan-opsi-row{
	display:flex;
align-items:center;
gap:8px;

}

.aturan-actions{
	display:flex;
gap:10px;
justify-content:flex-end;

}

.aturan-actions button{

flex:1;

}

@media(max-width:700px){

.aturan-grid{

grid-template-columns:1fr;

}

.aturan-actions{

flex-direction:column;

}

}

@media(max-width:700px){

body{

padding:8px;

}

.toolbar{

grid-template-columns:repeat(2,minmax(0,1fr));

}

.search-box{

grid-column:1 / -1;

}

button{

width:auto;
min-height:44px;

}

.modal-content{

width:100%;
margin:6px auto;
padding:14px;

}

#modalSemuaRiwayat .modal-content{

width:min(100%,1200px);
height:calc(100vh - 12px);
padding:12px;

}

.semua-riwayat-header,
.semua-riwayat-row{

grid-template-columns:60px 170px minmax(300px,1fr);
	gap:8px;
	min-width:640px;

}

.semua-riwayat-header{

border-radius:8px;

}

.semua-riwayat-item{

font-size:13px;
padding:7px 8px;

}

}

#loginPage{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d6efd,#002d72);

}

.login-box{

width:360px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
text-align:center;

}

.login-box h2{

margin-bottom:10px;
color:#0d6efd;

}

.login-box p{

margin-bottom:20px;
color:#666;

}

.login-box input{

width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;

}

.login-box button{

width:100%;
margin-top:10px;

    }

.search-box{

position:relative;
flex:1;
min-width:200px;

}

.search-box input{

width:100%;
padding:12px 12px 12px 40px;
border:1px solid #ccc;
border-radius:8px;

}

.search-icon{

position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:18px;

}

.notif{

display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
z-index:9999;
justify-content:center;
align-items:center;

}


.notif-box{

background:white;
width:320px;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3);
animation:popup .3s;

}


.notif-box h3{

color:#0d6efd;
margin-bottom:10px;

}


.notif-box p{

margin-bottom:20px;
color:#555;

}


.notif-box button{

background:#0d6efd;
color:white;
width:100%;

}

.notif-actions{
	display:flex;
	gap:10px;
	margin-top:15px;
}

.notif-actions button{
	flex:1;
	width:auto;
}

@keyframes popup{

from{

transform:scale(.8);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}

</style>

</head>

<body>

<div id="loginPage">

<form id="loginForm" class="login-box" onsubmit="event.preventDefault(); login();">

<h2>LOGIN PANEL</h2>

<p>San Andreas State Government</p>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button type="submit" class="primary">

LOGIN

</button>

</form>

</div>

<div id="notif" class="notif">

<div class="notif-box">

<h3>EXECUTIVE</h3>

<p id="notifText"></p>

<button onclick="tutupNotif()">OK</button>

</div>

</div>

<div id="confirm" class="notif">

<div class="notif-box">

<h3>CONFIRMATION</h3>

<p id="confirmText"></p>

<div class="notif-actions">

<button class="success" onclick="konfirmasiYa()">Ya</button>

<button class="danger" onclick="tutupConfirm()">Batal</button>

</div>

</div>

</div>

<div id="inputDialog" class="notif">

<div class="notif-box">

<h3 id="inputDialogTitle">INPUT</h3>

<input type="text" id="inputDialogInput" placeholder="Masukkan Keterangan" onkeydown="if(event.key==='Enter'){event.preventDefault(); simpanInputDialog();}">

<div class="notif-actions">

<button class="success" onclick="simpanInputDialog()">Simpan</button>

<button class="danger" onclick="tutupInputDialog()">Batal</button>

</div>

</div>

</div>

<div id="app" style="display:none;">

<div class="container">

<div class="header">

<h1>ABSENSI</h1>

<p>SAN ANDREAS STATE GOVERNMENT</p>

<p id="tanggal"></p>

</div>

<div class="dashboard">

<div class="card">

Total Anggota

<h2 id="totalAnggota">0</h2>

</div>

<div class="card">

Hadir

<h2 id="hadirCount">0</h2>

</div>

<div class="card">

Tidak Hadir

<h2 id="tidakCount">0</h2>

</div>

</div>

<div class="toolbar">

<button
class="danger"
onclick="logout()">

Logout

</button>

<div class="search-box">

<span class="search-icon">🔍</span>

<input
type="text"
id="search"
placeholder="Cari anggota..."
onkeyup="cari()">

</div>

<button
class="success"
onclick="tampilkanTambahAnggota()">

Tambah Anggota

</button>

<div id="formTambah" style="display:none; width:100%;">

<input
type="text"
id="namaBaru"
placeholder="Masukkan nama anggota baru">

<button
class="success"
onclick="tambahAnggota()">

Simpan Anggota

</button>

</div>

<button
class="primary"
onclick="checkAll()">

Centang Semua

</button>

<button
class="danger"
onclick="uncheckAll()">

Hapus Centang

</button>

<button
class="danger"
onclick="hapusSemuaRiwayat()">

Hapus Semua Riwayat

</button>

<button
class="info"
onclick="downloadExcel()">

Export Excel

</button>

<button
class="primary"
onclick="refreshAbsensi()">

Refresh Absensi

</button>

<button
class="info"
onclick="lihatSemuaRiwayat()">

Riwayat

</button>

</div>

<div class="table-area">

<table>

<thead>

<tr>

<th>No</th>

<th>Nama</th>

<th>Status</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="body">

</tbody>

</table>

</div>

</div>

<div
class="modal"
id="modal">

<div class="modal-content">

<h3>Riwayat Absensi</h3>

<div id="riwayatList"></div>

<br>

<button
class="danger"
onclick="tutupModal()">

Tutup

</button>

</div>

</div>

<div
class="modal"
id="modalSemuaRiwayat">

<div class="modal-content" style="max-width:900px;">

<h3>Riwayat Seluruh Anggota</h3>

<div class="aturan-actions" style="margin-bottom:12px;">

<button class="info" onclick="bukaAturan()">Aturan</button>

<button class="danger" onclick="tutupSemuaRiwayat()">Tutup</button>

</div>

<div id="semuaRiwayatList"
style="max-height:500px;overflow:auto;">

</div>

<br>

</div>

</div>

<div class="modal" id="aturanModal">

<div class="modal-content aturan-content">

<h3>Pengaturan Aturan Riwayat</h3>

<div class="aturan-grid">

<label>

Opsi

<select id="aturanMode" onchange="toggleAturanJumlah()">

<option value="hadir">Hadir</option>

<option value="tidakHadir">Tidak Hadir</option>

</select>

</label>

<label id="aturanJumlahWrap">

Jumlah Tidak Hadir

<input type="number" id="aturanJumlah" min="1" value="3">

</label>

</div>

<div class="aturan-jenis">

<label>

<div class="aturan-opsi-row">

<input type="radio" name="aturanJenis" value="semua" checked>

<span>Semua Tidak Hadir</span>

</div>

</label>

<label>

<div class="aturan-opsi-row">

<input type="radio" name="aturanJenis" value="tanpaKeterangan">

<span>Tidak Hadir Tanpa Keterangan</span>

</div>

</label>

<label>

<div class="aturan-opsi-row">

<input type="radio" name="aturanJenis" value="denganKeterangan">

<span>Tidak Hadir Dengan Keterangan</span>

</div>

</label>

</div>

<div class="aturan-actions">

<button class="success" onclick="terapkanAturan()">Terapkan</button>

<button class="danger" onclick="tutupAturan()">Tutup</button>

</div>

</div>

</div>

</div>

<script>
const defaultAnggota=[
"Zalvyero Zaroleth",
"Qheyla Vanuez",
"Steven Marfies",
"Sheline Atealyna",
"Mouviene Cavendrelle",
"Michael Sylvan",
"Sheyza Winterfell",
"Reyzen Valgueza",
"Jazey Lethewyche",
"Cassius Cavendrelle",
"Raymond Marfies",
"Johan Roberto",
"Sergio Morgan",
"Jay Marfies",
"Tyrone Walker",
"Elviano Agnelli",
"Smith Carasquillo",
"Cesar Barkley",
"Rodrigo Marquez",
"Carlos Pedro",
"Katsuro Ryuzaki",
"Yoshiro Nakamura",
"Darrell Lawson",
"Barrell Lawson",
"Jeffanio Lawson",
"Zalvero Zaroleth",
"Vanderline Dlaxs",
"Kaelis Zevallius",
"Connor Maverlyn",
"Kazenn Cluivert",
"Thancere Beauregard"
];

let anggota=JSON.parse(localStorage.getItem("anggota"));

if(!anggota){

anggota=defaultAnggota.map(n=>({

nama:n,
hadir:false,
keterangan:"",
riwayat:[]

}));

}

document.getElementById("tanggal").innerHTML=
new Date().toLocaleDateString("id-ID",{

weekday:"long",
day:"numeric",
month:"long",
year:"numeric"

});

function simpan(){

localStorage.setItem(
"anggota",
JSON.stringify(anggota)
);

}

function tampilkan(){

const body=document.getElementById("body");

body.innerHTML="";

let hadir=0;

anggota.forEach((a,index)=>{

if(a.hadir) hadir++;

body.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${a.nama}</td>

<td>

<input

type="checkbox"

${a.hadir?"checked":""}

onchange="ubahStatus(${index},this.checked)"

>

<br><br>

<span class="badge ${a.hadir?"hadir":"tidak"}">

${a.hadir
?"Hadir"
:"Tidak Hadir"+(a.keterangan ? " - "+a.keterangan : "")
}

</span>

${!a.hadir ? `

<br><br>

<button 
class="warning"
onclick="isiKeterangan(${index})">

${a.keterangan ? a.keterangan : "Isi Keterangan"}

</button>

`:""}

</td>

<td>

<button

class="warning"

onclick="editAnggota(${index})">

Edit

</button>

<button

class="danger"

onclick="hapusAnggota(${index})">

Hapus

</button>

<button

class="primary"

onclick="lihatRiwayat(${index})">

Riwayat

</button>

</td>

</tr>

`;

});

document.getElementById("totalAnggota").innerHTML=anggota.length;
document.getElementById("hadirCount").innerHTML=hadir;
document.getElementById("tidakCount").innerHTML=anggota.length-hadir;

}

tampilkan();

function tampilkanTambahAnggota(){

let form=document.getElementById("formTambah");

if(form.style.display==="none"){

    form.style.display="block";

}else{

    form.style.display="none";

}

}

function tambahAnggota(){

let nama=document.getElementById("namaBaru").value.trim();

if(nama==""){

notifikasi("Masukkan nama.");

return;

}

anggota.push({

nama:nama,
hadir:false,
keterangan:"",
riwayat:[]

});

document.getElementById("namaBaru").value="";

document.getElementById("formTambah").style.display="none";

simpan();

tampilkan();

}

function editAnggota(i){

tampilkanInputDialog("Edit Nama", anggota[i].nama, (nama)=>{

if(!nama){

notifikasi("Nama tidak boleh kosong.");

return;

}

anggota[i].nama=nama.trim();

simpan();

tampilkan();

});

}

function hapusAnggota(i){

tampilkanKonfirmasi("Hapus anggota?",()=>{

anggota.splice(i,1);

simpan();

tampilkan();

});

}

function ubahStatus(i,status){

    if(status){

        anggota[i].hadir=true;

        anggota[i].keterangan="";

        simpan();
        tampilkan();

        return;

    }

    tampilkanInputDialog(
        "Masukkan keterangan tidak hadir:",
        "Tanpa Keterangan",
        (ket)=>{

            if(!ket){

                ket="Tanpa Keterangan";

            }

            anggota[i].hadir=false;
            anggota[i].keterangan=ket.trim();

            simpan();
            tampilkan();

        },
        ()=>{

            anggota[i].hadir=true;
            anggota[i].keterangan="";

            simpan();
            tampilkan();

        }
    );

}

function isiKeterangan(i){

tampilkanInputDialog(
"Masukkan keterangan tidak hadir:",
anggota[i].keterangan || "",
(ket)=>{

if(!ket){

ket="Tanpa Keterangan";

}

anggota[i].keterangan=ket.trim();

simpan();

tampilkan();

}
);

}

function checkAll(){

    anggota.forEach(a=>a.hadir=true);

    simpan();

    tampilkan();

}

function uncheckAll(){

    anggota.forEach(a=>a.hadir=false);

    simpan();

    tampilkan();

}

function cari(){

let key=document.getElementById("search").value.toUpperCase();

document.querySelectorAll("#body tr").forEach(r=>{

r.style.display=
r.cells[1].innerText.toUpperCase().includes(key)
?"":"none";

});

}

let anggotaDipilih = -1;
let aturanRiwayat={

mode:"hadir",
jumlah:3,
tipe:"semua"

};

function hitungRiwayatStatus(a){

const normalisasi=(status)=>String(status||"").toLowerCase().trim();

const hadirCount=a.riwayat.filter(r=>normalisasi(r.status).startsWith("hadir")).length;
const tidakHadirCount=a.riwayat.filter(r=>normalisasi(r.status).startsWith("tidak hadir")).length;
const tanpaKeteranganCount=a.riwayat.filter(r=>normalisasi(r.status).startsWith("tidak hadir") && normalisasi(r.status).includes("tanpa keterangan")).length;
const denganKeteranganCount=a.riwayat.filter(r=>normalisasi(r.status).startsWith("tidak hadir") && !normalisasi(r.status).includes("tanpa keterangan")).length;

return {

hadirCount,

tidakHadirCount,
	tanpaKeteranganCount,
	denganKeteranganCount

};

}

function toggleAturanJumlah(){

const mode=document.getElementById("aturanMode").value;
const wrap=document.getElementById("aturanJumlahWrap");

wrap.style.display=mode==="tidakHadir"?"flex":"none";

}

function bukaAturan(){

const mode=document.getElementById("aturanMode");
const jumlah=document.getElementById("aturanJumlah");

mode.value=aturanRiwayat.mode;
jumlah.value=aturanRiwayat.jumlah;

const tipe=document.querySelector(`input[name="aturanJenis"][value="${aturanRiwayat.tipe}"]`);
if(tipe){

tipe.checked=true;
}

toggleAturanJumlah();

document.getElementById("aturanModal").style.display="block";

}

function tutupAturan(){

document.getElementById("aturanModal").style.display="none";

}

function terapkanAturan(){

aturanRiwayat.mode=document.getElementById("aturanMode").value;
aturanRiwayat.jumlah=Math.max(1,parseInt(document.getElementById("aturanJumlah").value)||1);
aturanRiwayat.tipe=document.querySelector("input[name='aturanJenis']:checked")?.value || "semua";

lihatSemuaRiwayat();

tutupAturan();

}

function lihatRiwayat(i){

anggotaDipilih=i;

document.getElementById("modal").style.display="block";

let html="";

if(anggota[i].riwayat.length==0){

function lihatSemuaRiwayat(){
	document.getElementById("modalSemuaRiwayat").style.display="block";

let html=`

<div class="semua-riwayat-header">

<div>No</div>

<div>Nama</div>

<div>Riwayat</div>

</div>

`;

let namaHijau=[];
let namaMerah=[];

if(aturanRiwayat.mode==="hadir"){

const maxHadir=Math.max(...anggota.map(a=>hitungRiwayatStatus(a).hadirCount),0);

namaHijau=anggota.filter(a=>hitungRiwayatStatus(a).hadirCount===maxHadir && maxHadir>0).map(a=>a.nama);

}else{

const hitungStatus=(status)=>{

if(aturanRiwayat.tipe==="tanpaKeterangan"){

return status && status.toLowerCase().includes("tidak hadir") && status.toLowerCase().includes("tanpa keterangan");

}

if(aturanRiwayat.tipe==="denganKeterangan"){

return status && status.toLowerCase().includes("tidak hadir") && !status.toLowerCase().includes("tanpa keterangan");

}

return status && status.toLowerCase().includes("tidak hadir");

};

namaMerah=anggota.filter(a=>{

const count=a.riwayat.filter(r=>hitungStatus(r.status)).length;

return count===aturanRiwayat.jumlah;

}).map(a=>a.nama);

}

anggota.forEach((a,index)=>{

const classNama=aturanRiwayat.mode==="hadir" && namaHijau.includes(a.nama)
?"semua-riwayat-nama nama-hijau"
:aturanRiwayat.mode==="tidakHadir" && namaMerah.includes(a.nama)
?"semua-riwayat-nama nama-merah"
:"semua-riwayat-nama";

html+=`

<div class="semua-riwayat-row">

<div class="semua-riwayat-no">${index+1}</div>

<div class="${classNama}">${a.nama}</div>

<div class="semua-riwayat-riwayat">

`;

if(a.riwayat.length==0){

html+=`<div class="semua-riwayat-empty">Belum ada riwayat.</div>`;

}else{

a.riwayat.forEach(r=>{

html+=`
<div class="semua-riwayat-item"><strong>${r.tanggal}</strong> - ${r.status}</div>
`;

});

}

html+=`

</div>

</div>

`;

});

document.getElementById("semuaRiwayatList").innerHTML=html;

}

let konfirmasiCallback=null;
let inputDialogCallback=null;
let inputDialogCancelCallback=null;

function tampilkanKonfirmasi(pesan,callback){

konfirmasiCallback=callback;

document.getElementById("confirmText").innerHTML=pesan;

document.getElementById("confirm").style.display="flex";

}

function tutupConfirm(){

konfirmasiCallback=null;

document.getElementById("confirm").style.display="none";

}

function konfirmasiYa(){

if(typeof konfirmasiCallback==="function"){

konfirmasiCallback();

}


tutupConfirm();

}

function tampilkanInputDialog(title,defaultValue,callback,cancelCallback=null){

inputDialogCallback=callback;
inputDialogCancelCallback=cancelCallback;

document.getElementById("inputDialogTitle").innerHTML=title;

document.getElementById("inputDialogInput").value=defaultValue || "";

document.getElementById("inputDialog").style.display="flex";

setTimeout(()=>{

const input=document.getElementById("inputDialogInput");

input.focus();

input.select();

},20);

}

function tutupInputDialog(){

const cancelCallback=inputDialogCancelCallback;

inputDialogCallback=null;
inputDialogCancelCallback=null;

document.getElementById("inputDialog").style.display="none";

if(typeof cancelCallback==="function"){

cancelCallback();

}

}

function simpanInputDialog(){

const value=document.getElementById("inputDialogInput").value;
const callback=inputDialogCallback;

inputDialogCallback=null;
inputDialogCancelCallback=null;

document.getElementById("inputDialog").style.display="none";

if(typeof callback==="function"){

callback(value);

}

}
